<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule a Chit Chat — Bob Corrigan</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1714;
      --paper: #f0ebe3;
      --cream: #e8e0d4;
      --rust: #2FA5A7;
      --muted: #8a8178;
      --rule: #c8bfb4;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 2rem 5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.6;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(to bottom, transparent, transparent 39px, var(--rule) 39px, var(--rule) 40px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    .back {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
      animation-delay: 0.05s;
    }
    .back:hover { color: var(--rust); }
    .back::after { content: ' →'; }

    .footer-btn {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--rule);
      padding: 0.4rem 0.7rem;
      border-radius: 2px;
      display: inline-flex;
      align-items: center;
      transition: border-color 0.15s, color 0.15s;
    }

    .footer-btn:hover { border-color: var(--rust); color: var(--rust); }
    .footer-btn .dot { margin-right: 0.5rem; }

    .header {
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.1s;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 9vw, 4rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .title em {
      font-style: italic;
      color: var(--rust);
    }

    .divider {
      width: 100%;
      height: 2px;
      background: var(--ink);
      margin: 1.5rem 0 0.5rem;
    }

    .sub {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Step indicator */
    .steps {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.2s;
    }

    .step {
      flex: 1;
      padding: 0.6rem 0;
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 2px solid var(--rule);
      transition: all 0.2s;
    }

    .step.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    .step.done {
      color: var(--rust);
      border-bottom-color: var(--rust);
    }

    /* Section panels */
    .panel {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.3s;
      display: none;
    }

    .panel.visible { display: block; }

    /* Month nav */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    .month-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .month-btn {
      background: none;
      border: 1.5px solid var(--ink);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.05em;
    }

    .month-btn:hover {
      background: var(--ink);
      color: var(--paper);
    }

    .month-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .month-btn:disabled:hover {
      background: none;
      color: var(--ink);
    }

    /* Day labels */
    .day-labels {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.4rem;
      margin-bottom: 0.6rem;
    }

    .day-label {
      text-align: center;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.2rem 0;
    }

    /* Calendar grid */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.4rem;
    }

    .day-bubble {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1.5px solid transparent;
      font-family: 'DM Mono', monospace;
    }

    .day-bubble.empty { visibility: hidden; }

    .day-bubble.past {
      color: var(--rule);
      cursor: default;
    }

    .day-bubble.saturday {
      color: var(--rule);
      cursor: default;
    }

    .day-bubble.available {
      border-color: var(--ink);
      color: var(--ink);
      background: var(--paper);
    }

    .day-bubble.available:hover {
      background: var(--cream);
      border-color: var(--rust);
      color: var(--rust);
      transform: scale(1.08);
    }

    .day-bubble.selected {
      background: var(--rust);
      border-color: var(--rust);
      color: var(--paper);
      transform: scale(1.08);
    }

    .day-bubble.today {
      font-weight: 500;
    }

    /* Time slots */
    .time-section {
      margin-top: 1.5rem;
      border-top: 1.5px solid var(--ink);
      padding-top: 1.2rem;
    }

    .time-label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }

    .time-slots {
      display: flex;
      gap: 0.8rem;
    }

    .time-slot {
      flex: 1;
      padding: 0.9rem;
      border: 1.5px solid var(--ink);
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--paper);
      letter-spacing: 0.05em;
    }

    .time-slot:hover {
      background: var(--cream);
      border-color: var(--rust);
      color: var(--rust);
    }

    .time-slot.selected {
      background: var(--rust);
      border-color: var(--rust);
      color: var(--paper);
    }

    /* Continue button */
    .btn-continue {
      width: 100%;
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
      display: none;
    }

    .btn-continue.visible { display: block; }
    .btn-continue:hover { background: var(--rust); }

    /* Form */
    .form-section {
      border: 1.5px solid var(--ink);
    }

    .form-field {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--rule);
      padding: 1rem 1.2rem;
    }

    .form-field:last-child { border-bottom: none; }

    .form-field label {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .form-field input,
    .form-field textarea {
      background: none;
      border: none;
      outline: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--ink);
      resize: none;
      width: 100%;
    }

    .form-field textarea { min-height: 80px; }

    .form-field input::placeholder,
    .form-field textarea::placeholder {
      color: var(--rule);
    }

    .booking-summary {
      background: var(--cream);
      border: 1.5px solid var(--ink);
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .booking-summary-text {
      font-size: 0.75rem;
      line-height: 1.5;
    }

    .booking-summary-change {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--rust);
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      margin-left: 1rem;
    }

    .booking-summary-change:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: var(--rust); }

    /* Success */
    .success-box {
      border: 1.5px solid var(--ink);
      padding: 2.5rem 1.5rem;
      text-align: center;
    }

    .success-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
      display: block;
    }

    .success-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .success-sub {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      line-height: 1.6;
    }

    /* Footer */
    .footer {
      margin-top: 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.5s;
    }

    .footer-note {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--rust);
      display: inline-block;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    .url-pill {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      border: 1px solid var(--rule);
      padding: 0.3rem 0.7rem;
      border-radius: 2px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 400px) {
      .day-bubble { font-size: 0.65rem; }
      .time-slot { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div style="display:flex; justify-content:space-between; align-items:baseline; width:100%; margin-bottom:2.5rem;">
      <p class="label" style="margin-bottom:0;">05 — Let's Talk</p>
      <a href="/" class="back" style="margin-bottom:0;">bobcorrigan.com</a>
    </div>

    <header class="header">
      <h1 class="title">Schedule a<br /><em>Chit Chat</em></h1>
      <div class="divider"></div>
      <p class="sub">Pick a time · Fill in your deets</p>
    </header>

    <div style="border: 1.5px solid var(--ink); padding: 2rem 1.4rem; text-align: center; margin-top: 1rem;">
      <p style="font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 0.6rem;">Not taking meetings right now.</p>
      <p style="font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);">Check back soon.</p>
    </div>

    <footer class="footer" style="margin-top: 2rem;">
      <a href="https://www.lorettasnorthwesterner.com" target="_blank" rel="noopener" class="footer-btn">
        <span class="dot"></span>PNW Based · Midwest Roots
      </a>
    </footer>

  </div>
</body>
</html>
