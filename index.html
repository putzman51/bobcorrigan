<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bob Corrigan</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #1a1714;
      --paper: #f0ebe3;
      --cream: #e8e0d4;
      --rust: #2FA5A7;
      --muted: #8a8178;
      --rule: #c8bfb4;
    }

    html, body { height: 100%; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: safe center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.6;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 39px,
        var(--rule) 39px,
        var(--rule) 40px
      );
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      margin: auto;
    }

    .header {
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.1s;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .name em {
      font-style: italic;
      color: var(--rust);
    }

    .divider {
      width: 100%;
      height: 2px;
      background: var(--ink);
      margin: 1.5rem 0 0.75rem;
    }

    .sub-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .sub {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--rust);
    }

    /* Chit Chat CTA button */
    .chit-chat-cta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--rust);
      border: 1.5px solid var(--ink);
      background: var(--paper);
      padding: 0.45rem 0.8rem 0.45rem 0.6rem;
      transition: all 0.18s ease;
      flex-shrink: 0;
    }

    .chit-chat-cta:hover {
      background: var(--rust);
      border-color: var(--rust);
      color: var(--paper);
    }

    .cta-icon {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    .icon-stroke {
      stroke: var(--rust);
      transition: stroke 0.18s ease;
    }

    .chit-chat-cta:hover .icon-stroke {
      stroke: var(--paper);
    }

    .cta-label {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Link rows */
    .links {
      display: flex;
      flex-direction: column;
    }

    .link-item {
      display: flex;
      align-items: stretch;
      border: 1.5px solid var(--ink);
      border-bottom: none;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      transition: transform 0.15s ease;
    }

    .link-item:first-child { border-top: 1.5px solid var(--ink); }
    .link-item:last-child  { border-bottom: 1.5px solid var(--ink); }

    .link-item:nth-child(1) { animation-delay: 0.3s; }
    .link-item:nth-child(2) { animation-delay: 0.42s; }
    .link-item:nth-child(3) { animation-delay: 0.54s; }
    .link-item:nth-child(4) { animation-delay: 0.66s; }
    .link-item:nth-child(5) { animation-delay: 0.78s; }

    /* Camera icon cell */
    .camera-cell {
      padding: 1.4rem 1rem;
      border-right: 1.5px solid var(--ink);
      min-width: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .link-item:hover .camera-cell {
      background: var(--rust);
      border-right-color: var(--rust);
    }
    .camera-svg { width: 17px; height: 17px; flex-shrink: 0; }
    .c-body {
      fill: none; stroke: var(--muted);
      stroke-width: 1.4; stroke-linejoin: round; stroke-linecap: round;
      transition: stroke 0.2s;
    }
    .c-lens {
      fill: none; stroke: var(--muted);
      stroke-width: 1.2;
      transition: stroke 0.2s;
    }
    .c-dot {
      fill: var(--muted);
      transition: fill 0.2s;
    }
    .link-item:hover .c-body,
    .link-item:hover .c-lens { stroke: var(--paper); }
    .link-item:hover .c-dot  { fill: var(--paper); }

    .link-item:hover { transform: translate(-3px, -3px); z-index: 2; }
    .link-item:hover .link-number { background: var(--rust); color: var(--paper); border-right-color: var(--rust); }
    .link-item:hover .link-arrow  { transform: translate(3px, -3px); }

    .link-item a {
      display: flex;
      align-items: center;
      width: 100%;
      text-decoration: none;
      color: var(--ink);
    }

    .link-number {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 1.4rem 1rem;
      border-right: 1.5px solid var(--ink);
      min-width: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      background: var(--cream);
      flex-shrink: 0;
    }

    .link-content { padding: 1.4rem; flex: 1; }

    .link-tag {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 0.3rem;
    }

    .link-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
      display: block;
    }

    .link-arrow {
      font-size: 1.2rem;
      padding: 0 1.4rem;
      color: var(--rust);
      display: flex;
      align-items: center;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .footer {
      margin-top: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.8s;
    }

    .footer-note {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--rust);
      display: inline-block;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    .url-pill {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      border: 1px solid var(--rule);
      padding: 0.3rem 0.7rem;
      border-radius: 2px;
    }

    a.egg {
      color: inherit;
      text-decoration: none;
      cursor: text;
      font: inherit;
      letter-spacing: inherit;
      display: inline;
    }
    a.egg:hover, a.egg:visited, a.egg:active, a.egg:focus {
      color: inherit;
      text-decoration: none;
      outline: none;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--rust);
      display: inline-block;
      flex-shrink: 0;
      position: relative;
    }

    .live-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1.5px solid var(--rust);
      animation: livePulse 1.4s ease-out infinite;
      opacity: 0;
    }

    .live-scores-btn:hover {
      background: var(--rust);
      border-color: var(--rust) !important;
      color: var(--paper) !important;
    }

    .live-scores-btn:hover .live-dot {
      background: var(--paper);
    }

    .live-scores-btn:hover .live-dot::after {
      border-color: var(--paper);
    }

    @keyframes livePulse {
      0%   { transform: scale(0.6); opacity: 0.8; }
      100% { transform: scale(2);   opacity: 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .link-title { font-size: 1.15rem; }
      .cta-label {
        font-size: 0.52rem;
        letter-spacing: 0.1em;
        display: inline !important;
      }
      .cta-icon { width: 15px; height: 15px; }
      .chit-chat-cta { padding: 0.4rem 0.7rem 0.4rem 0.5rem; gap: 0.35rem; }
    }
  </style>
</head>
<body>
