<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bob Corrigan</title>
  <meta name="description" content="Bob Corrigan — disc golfer, PNW-based with Midwest roots." />
  <meta property="og:title" content="Bob Corrigan" />
  <meta property="og:description" content="Disc golfer, PNW-based with Midwest roots." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bobcorrigan.com" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #1a1714;
      --paper: #f0ebe3;
      --cream: #e8e0d4;
      --green: #d4f0d8;
      --green-dim: #d4f0d830;
      --green-glow: #d4f0d818;
      --green-dark: #c2e8c7;
      --muted: #8a8178;
      --rule: #c8bfb4;
      --warm: #d4a373;
    }

    html {
      height: 100%;
      scroll-behavior: smooth;
    }

    body {
      background: #b8b0a4;
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Subtle crosshatch desktop pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        url("data:image/svg+xml,%3Csvg width='6' height='6' viewBox='0 0 6 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%239e968a' fill-opacity='0.15'%3E%3Crect width='1' height='1' x='0' y='0'/%3E%3Crect width='1' height='1' x='3' y='3'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* The main "window" */
    .mac-window {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 1rem auto;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--paper);
      box-shadow:
        4px 4px 0 rgba(0,0,0,0.15),
        inset 0 0 0 1px rgba(255,255,255,0.3);
      overflow: hidden;
    }

    /* Title bar */
    .title-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: 40px;
      background: linear-gradient(180deg, #e8e2d8 0%, #d6d0c6 40%, #cac3b8 100%);
      border-bottom: 2px solid var(--ink);
      user-select: none;
    }

    .traffic-lights {
      position: absolute;
      left: 10px;
      display: flex;
      gap: 6px;
    }

    .traffic-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.2);
    }

    .traffic-dot.close { background: #ff6058; }
    .traffic-dot.minimize { background: #ffbd2e; }
    .traffic-dot.maximize { background: var(--green); }

    .title-bar-text {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    }

    .title-bar-text .egg {
      color: inherit;
      text-decoration: none;
      cursor: text;
    }
    .title-bar-text .egg:hover,
    .title-bar-text .egg:visited,
    .title-bar-text .egg:active,
    .title-bar-text .egg:focus {
      color: inherit;
      text-decoration: none;
      outline: none;
    }

    /* Menu bar */
    .menu-bar {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 0.3rem 1rem;
      background: var(--cream);
      border-bottom: 1px solid var(--rule);
      font-family: 'Space Mono', monospace;
      font-size: 0.5rem;
      color: var(--muted);
      user-select: none;
    }

    .menu-bar span { cursor: default; }
    .menu-bar span:first-child { font-weight: 700; color: var(--ink); }
    .menu-bar span:hover { color: var(--green); }
    .menu-link {
      text-decoration: none;
      color: var(--muted);
      transition: color 0.15s;
    }
    .menu-link:first-child {
      font-weight: 700;
      color: var(--ink);
    }
    .menu-link:hover { color: var(--green); }

    /* Window body */
    .window-body {
      padding: 1.5rem;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 0.1s;
    }

    .site-url {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .location-tag {
      font-size: 0.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    /* ── Cards ── */
    .card-stack {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .card {
      border: 1.5px solid var(--rule);
      background: var(--paper);
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      transition: box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .card:hover {
      box-shadow: 4px 4px 0 var(--green-dim);
      border-color: var(--muted);
    }

    .card:nth-child(1) { animation-delay: 0.2s; }
    .card:nth-child(2) { animation-delay: 0.35s; }
    .card:nth-child(3) { animation-delay: 0.5s; }
    .card:nth-child(4) { animation-delay: 0.65s; }
    .card:nth-child(5) { animation-delay: 0.8s; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--rule);
      background: var(--cream);
    }

    .card-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .card-icon path,
    .card-icon circle,
    .card-icon line,
    .card-icon polyline,
    .card-icon rect {
      fill: none;
      stroke: var(--muted);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-number {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 0.48rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--rule);
    }

    .card-body {
      padding: 1rem;
    }

    /* ── Unified action button ── */
    .action-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.75rem 0.9rem;
      border: 1.5px solid var(--green-dark);
      background: var(--green);
      text-decoration: none;
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      transition: all 0.2s ease;
      cursor: pointer;
      margin-bottom: 0.6rem;
      box-shadow: 0 2px 0 var(--green-dark);
    }

    .action-btn:last-child {
      margin-bottom: 0;
    }

    .action-btn:hover {
      background: var(--green-dark);
      border-color: var(--green-dark);
      box-shadow: 0 2px 0 rgba(0,0,0,0.15);
    }

    .action-btn:hover .action-btn-arrow {
      transform: translate(3px, -3px);
    }

    .action-btn:active {
      box-shadow: none;
      transform: translateY(1px);
    }

    .action-btn:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }

    .action-btn-text {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      text-align: left;
    }

    .action-btn-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
      transition: color 0.15s ease;
    }

    .action-btn-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.48rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(26, 23, 20, 0.55);
    }

    .action-btn-arrow {
      flex-shrink: 0;
      transition: all 0.15s ease;
      margin-left: 1rem;
      line-height: 1;
      width: 30px;
      height: 30px;
      filter: drop-shadow(0 0 4px rgba(212, 240, 216, 0.9)) drop-shadow(0 0 8px rgba(212, 240, 216, 0.5));
    }

    .action-btn-arrow svg {
      width: 100%;
      height: 100%;
    }

    .action-btn:hover .action-btn-arrow {
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.9)) drop-shadow(0 0 12px rgba(212, 240, 216, 0.8));
    }

    /* Icons inside buttons */
    .btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .btn-icon path,
    .btn-icon circle,
    .btn-icon line,
    .btn-icon rect {
      fill: none;
      stroke: var(--ink);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.5;
    }

    /* Pulse dot for warm up */
    .pulse-dot-inline {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink);
      position: relative;
      flex-shrink: 0;
      margin-right: 0.5rem;
    }

    .pulse-dot-inline::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1.5px solid var(--ink);
      animation: pulse 1.4s ease-out infinite;
      opacity: 0;
    }

    @keyframes pulse {
      0% { transform: scale(0.6); opacity: 0.7; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .stat {
      padding: 0.7rem 0.7rem;
      border-bottom: 1px solid var(--rule);
      border-right: 1px solid var(--rule);
      transition: background 0.2s ease;
    }

    .stat:hover {
      background: var(--green-glow);
    }

    .stat:nth-child(even) { border-right: none; }
    .stat:nth-last-child(-n+2) { border-bottom: none; }

    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      line-height: 1;
      color: var(--ink);
      margin-bottom: 0.15rem;
    }

    .stat-value.accent { color: var(--green); }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.44rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--rule);
      margin-top: 1.5rem;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 0.9s;
    }

    .footer-left {
      font-size: 0.45rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .footer-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
    }

    .beep-boop {
      font-size: 0.45rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .beep-boop:hover { color: var(--green); }

    a.egg {
      color: inherit;
      text-decoration: none;
      cursor: text;
    }
    a.egg:hover, a.egg:visited, a.egg:active, a.egg:focus {
      color: inherit;
      text-decoration: none;
      outline: none;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      body {
        padding: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .mac-window {
        margin: 0;
        border-radius: 8px;
        width: 100%;
      }
      .window-body {
        padding: 0.75rem;
      }
      .card-stack {
        gap: 0.5rem;
      }
      .action-btn {
        margin-bottom: 0;
        padding: 0.6rem 0.75rem;
      }
      .footer {
        margin-top: 1rem;
      }

      .top-bar {
        padding-bottom: 0.6rem;
        margin-bottom: 0.75rem;
      }

      .title-bar-text {
        font-size: 0.85rem;
      }

      .action-btn-title {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
