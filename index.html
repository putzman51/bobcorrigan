<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bob Corrigan</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #1a1714;
      --paper: #f0ebe3;
      --cream: #e8e0d4;
      --rust: #b84c2b;
      --muted: #8a8178;
      --rule: #c8bfb4;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.6;
    }

    /* Ruled lines background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 39px,
        var(--rule) 39px,
        var(--rule) 40px
      );
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* Header / Name block */
    .header {
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.1s;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .name em {
      font-style: italic;
      color: var(--rust);
    }

    .divider {
      width: 100%;
      height: 2px;
      background: var(--ink);
      margin: 1.5rem 0 0.5rem;
    }

    .sub {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      gap: 1.5rem;
    }

    /* Link buttons */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .link-item {
      display: flex;
      align-items: stretch;
      border: 1.5px solid var(--ink);
      border-bottom: none;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      transition: transform 0.15s ease;
    }

    .link-item:first-child {
      border-top: 1.5px solid var(--ink);
    }

    .link-item:last-child {
      border-bottom: 1.5px solid var(--ink);
    }

    .link-item:nth-child(1) { animation-delay: 0.3s; }
    .link-item:nth-child(2) { animation-delay: 0.42s; }
    .link-item:nth-child(3) { animation-delay: 0.54s; }
    .link-item:nth-child(4) { animation-delay: 0.66s; }

    .link-item:hover {
      transform: translate(-3px, -3px);
      z-index: 2;
    }

    .link-item:hover .link-number {
      background: var(--rust);
      color: var(--paper);
      border-right-color: var(--rust);
    }

    .link-item:hover .link-arrow {
      transform: translate(3px, -3px);
    }

    .link-item a {
      display: flex;
      align-items: center;
      width: 100%;
      text-decoration: none;
      color: var(--ink);
    }

    .link-number {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 1.4rem 1rem;
      border-right: 1.5px solid var(--ink);
      min-width: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      background: var(--cream);
      flex-shrink: 0;
    }

    .link-content {
      padding: 1.4rem 1.4rem;
      flex: 1;
    }

    .link-tag {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 0.3rem;
    }

    .link-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
      display: block;
    }

    .link-arrow {
      font-size: 1.2rem;
      padding: 0 1.4rem;
      color: var(--rust);
      display: flex;
      align-items: center;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.7s;
    }

    .footer-note {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--rust);
      display: inline-block;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    /* URL display */
    .url-pill {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      border: 1px solid var(--rule);
      padding: 0.3rem 0.7rem;
      border-radius: 2px;
    }

    /* Easter egg - completely invisible links */
    a.egg {
      color: inherit;
      text-decoration: none;
      cursor: text;
      font: inherit;
      letter-spacing: inherit;
      display: inline;
    }
    a.egg:hover,
    a.egg:visited,
    a.egg:active,
    a.egg:focus {
      color: inherit;
      text-decoration: none;
      outline: none;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .link-title {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <p class="label">bobcorrigan.com</p>
      <h1 class="name">B<a href="https://www.thenicestplace.net" target="_blank" rel="noopener" class="egg">o</a>b<br /><em>C<a href="https://www.thenicestplace.net" target="_blank" rel="noopener" class="egg">o</a>rrigan</em></h1>
      <div class="divider"></div>
      <div class="sub">
        <span>Steward of Parks · Administrator · Blogger · Disc Golfer</span>
      </div>
    </header>

    <nav class="links">
      <div class="link-item">
        <a href="https://www.pdga.com/player/316354" target="_blank" rel="noopener">
          <div class="link-number">01</div>
          <div class="link-content">
            <span class="link-tag">Sport / PDGA</span>
            <span class="link-title">PDGA AM Disc Golfer</span>
          </div>
          <div class="link-arrow">↗</div>
        </a>
      </div>

      <div class="link-item">
        <a href="https://www.linkedin.com/in/benefitsbob" target="_blank" rel="noopener">
          <div class="link-number">02</div>
          <div class="link-content">
            <span class="link-tag">Professional</span>
            <span class="link-title">LinkedIn · Benefits Bob</span>
          </div>
          <div class="link-arrow">↗</div>
        </a>
      </div>

      <div class="link-item">
        <a href="https://www.fallingspoon.com" target="_blank" rel="noopener">
          <div class="link-number">03</div>
          <div class="link-content">
            <span class="link-tag">Writing</span>
            <span class="link-title">Falling Spoon</span>
          </div>
          <div class="link-arrow">↗</div>
        </a>
      </div>

      <div class="link-item">
        <a href="https://www.secretvendingmachine.com" target="_blank" rel="noopener">
          <div class="link-number">04</div>
          <div class="link-content">
            <span class="link-tag">Art Blog</span>
            <span class="link-title">Secret Vending Machine</span>
          </div>
          <div class="link-arrow">↗</div>
        </a>
      </div>
    </nav>

    <footer class="footer">
      <span class="footer-note"><span class="dot"></span>PNW Based · Midwest Roots</span>
      <span class="url-pill">bobcorrigan.com</span>
    </footer>
  </div>
</body>
</html>
