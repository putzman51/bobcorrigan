<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotational Athlete Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #111;
    --surface2: #1a1a1a;
    --border: #1e1e1e;
    --border-hi: #2a2a2a;
    --text: #e4e0d8;
    --text-dim: #999;
    --text-muted: #555;
    --accent: #ff4d00;
    --green: #2ecc71;
    --green-dim: rgba(46,204,113,0.08);
    --green-border: rgba(46,204,113,0.2);
    --yellow: #d4a832;
    --yellow-dim: rgba(212,168,50,0.07);
    --yellow-border: rgba(212,168,50,0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 680px; margin: 0 auto; padding: 20px 16px; }
  .header { border-bottom: 2px solid var(--accent); padding-bottom: 14px; margin-bottom: 24px; position: relative; }
  .header::after { content:''; position:absolute; bottom:-2px; left:0; width:100%; height:1px; background:var(--accent); box-shadow:0 0 20px var(--accent),0 0 60px rgba(255,77,0,0.25); }
  .header h1 { font-family:'Outfit',sans-serif; font-size:clamp(18px,4.5vw,26px); font-weight:900; color:var(--accent); letter-spacing:3px; text-transform:uppercase; }
  .header .sub { font-size:10px; color:var(--text-muted); letter-spacing:2px; margin-top:4px; }
  .view-btns { display:flex; gap:6px; margin-bottom:18px; }
  .view-btn { padding:5px 14px; background:transparent; color:var(--text-muted); border:1px solid var(--border); font-family:inherit; font-size:10px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .15s; }
  .view-btn:hover { border-color:var(--text-dim); color:var(--text-dim); }
  .view-btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:700; }
  .day-tabs { display:flex; gap:4px; margin-bottom:20px; position:sticky; top:0; z-index:10; background:var(--bg); padding:4px 0 8px; }
  .day-tab { flex:1; padding:10px 4px; background:var(--surface); color:var(--text-dim); border:1px solid var(--border); font-family:inherit; font-size:10px; cursor:pointer; text-align:center; transition:all .15s; letter-spacing:1px; }
  .day-tab:hover { border-color:var(--border-hi); color:var(--text); }
  .day-tab .di { font-size:16px; display:block; margin-bottom:2px; }
  .day-tab.active { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:700; }
  .day-header { background:var(--surface); border:1px solid var(--border); padding:16px; margin-bottom:12px; }
  .day-header h2 { font-family:'Outfit',sans-serif; font-size:16px; font-weight:800; color:var(--accent); letter-spacing:2px; }
  .day-header .focus { font-size:11px; color:var(--text-dim); margin-top:4px; }
  .day-header .dur { display:inline-block; font-size:10px; color:var(--accent); border:1px solid rgba(255,77,0,0.4); padding:2px 8px; margin-top:8px; }
  .dgt { margin-top:8px; padding:8px 12px; background:var(--yellow-dim); border:1px solid var(--yellow-border); font-size:10px; color:var(--yellow); line-height:1.5; }
  .dgt strong { color:#e8c24a; }
  .warmup { background:var(--green-dim); border:1px solid var(--green-border); padding:12px 14px; margin-bottom:14px; }
  .warmup-t { font-size:9px; font-weight:700; color:var(--green); letter-spacing:3px; margin-bottom:6px; }
  .warmup-i { font-size:11px; color:rgba(46,204,113,0.7); padding:2px 0; }
  .block { background:var(--surface); border:1px solid var(--border); margin-bottom:6px; overflow:hidden; }
  .bh { width:100%; padding:12px 14px; background:transparent; color:var(--text); border:none; font-family:inherit; font-size:12px; font-weight:700; letter-spacing:1px; cursor:pointer; text-align:left; display:flex; justify-content:space-between; align-items:center; transition:background .1s; }
  .bh:hover { background:var(--surface2); }
  .bh .tgl { color:var(--accent); font-size:14px; }
  .bb { padding:0 14px 14px; }
  .bn { font-size:10px; color:var(--text-dim); font-style:italic; margin-bottom:10px; line-height:1.5; }
  .ex { padding:10px 0; border-top:1px solid var(--border); }
  .ex:first-child { border-top:none; }
  .et { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; flex-wrap:wrap; }
  .en { font-size:12px; font-weight:700; color:var(--text); line-height:1.3; }
  .em { display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .es { font-size:9px; color:var(--bg); background:var(--accent); padding:2px 6px; font-weight:700; white-space:nowrap; }
  .er { font-size:9px; color:var(--text-muted); white-space:nowrap; }
  .eno { font-size:10px; color:var(--text-dim); margin-top:4px; line-height:1.5; }
  .eq { display:inline-block; font-size:8px; color:var(--text-muted); background:var(--surface2); padding:1px 5px; margin-top:4px; letter-spacing:1px; }
  .pc { background:var(--surface); border:1px solid var(--border); padding:14px 16px; margin-bottom:6px; }
  .wb { font-size:9px; background:var(--accent); color:var(--bg); padding:2px 8px; font-weight:700; display:inline-block; margin-right:8px; }
  .pn { font-family:'Outfit',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px; }
  .pd { font-size:11px; color:var(--text-dim); margin-top:6px; line-height:1.6; }
  .ib { padding:14px 16px; margin-top:12px; font-size:11px; line-height:1.8; }
  .ib.g { background:var(--green-dim); border:1px solid var(--green-border); color:rgba(46,204,113,0.75); }
  .ib.g strong { color:var(--green); }
  .ib.y { background:var(--yellow-dim); border:1px solid var(--yellow-border); color:rgba(212,168,50,0.75); }
  .ib.y strong { color:var(--yellow); }
  .footer { margin-top:24px; padding-top:10px; border-top:1px solid var(--border); font-size:9px; color:var(--text-muted); letter-spacing:1px; text-align:center; }
  @media(max-width:480px){ .app{padding:12px 10px;} }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const D=[
{day:"Monday",label:"ROTATIONAL POWER + PUSH",icon:"🌀",focus:"Explosive rotation, chest, shoulders, triceps",dg:"Backhand & forehand power generation, release speed",dur:"~70 min",
warmup:["Jump rope — 3 min","Band pull-aparts — 2×15","World's greatest stretch — 5/side","Cable trunk rotations (light) — 2×10/side"],
blocks:[
{name:"A — ROTATIONAL POWER",notes:"Explosive intent. Move fast on the concentric.",ex:[
{n:"Cable Woodchop (Low to High)",s:"4×8/side",r:"90s",no:"Explode through hips. This IS your disc golf throw pattern.",eq:"Cable"},
{n:"Half-Kneeling Cable Chop (High to Low)",s:"3×10/side",r:"60s",no:"Anti-rotation + deceleration. Trains the braking muscles.",eq:"Cable"},
{n:"Rotational MB Slam (or DB Rotational Press)",s:"3×6/side",r:"90s",no:"Max intent. Use explosive single-arm cable press with rotation.",eq:"Floor/Cable"},
]},
{name:"B — HORIZONTAL PUSH",notes:"Strength foundation for shoulder stability and pressing power.",ex:[
{n:"Dumbbell Bench Press",s:"4×8",r:"2.5 min",no:"Progressive overload — aim for PR sets.",eq:"DB"},
{n:"Incline DB Press",s:"3×10",r:"2 min",no:"30° incline. Upper chest + front delts.",eq:"DB"},
{n:"Cable Flye",s:"3×12",r:"60s",no:"Squeeze at peak contraction.",eq:"Cable"},
]},
{name:"C — SHOULDERS & FINISHER",notes:"Shoulder health is non-negotiable for disc golfers.",ex:[
{n:"DB Lateral Raise",s:"4×12",r:"60s",no:"Control the eccentric. Capped delts = aesthetics.",eq:"DB"},
{n:"Cable Face Pull",s:"3×15",r:"60s",no:"External rotation at the top. Protects rotator cuff.",eq:"Cable"},
{n:"Overhead Tricep Extension (Cable)",s:"3×12",r:"60s",no:"Long head tricep. Arm size + elbow health.",eq:"Cable"},
]}
]},
{day:"Tuesday",label:"PULL + PULL-UP PROGRESSION",icon:"🎯",focus:"Back, biceps, grip, pull-up volume",dg:"Lat engagement in pull-through, grip endurance for 18+ holes",dur:"~65 min",
warmup:["Rowing machine — 3 min easy","Band pull-aparts — 2×15","Scapular pull-ups — 3×5","Cat-cow — 10 reps"],
blocks:[
{name:"A — PULL-UP PROGRESSION",notes:"Build to sets of 5+ within 8 weeks.",ex:[
{n:"Pull-Ups (Cluster Sets)",s:"5×(1-2)",r:"60s",no:"Singles or doubles. Accumulate 8-10 total reps. Add a rep weekly.",eq:"Bar"},
{n:"Negative Pull-Ups",s:"3×4 (5s down)",r:"90s",no:"Jump up, lower as slowly as possible.",eq:"Bar"},
{n:"Band-Assisted Pull-Ups",s:"2×max",r:"90s",no:"Lightest band. Drop when you can do 3×3 unassisted.",eq:"Bar/Band"},
]},
{name:"B — HORIZONTAL PULL",notes:"Thick back = aesthetics + disc golf power.",ex:[
{n:"Single-Arm DB Row",s:"4×8/side",r:"90s",no:"Heavy. PR tracker exercise. Brace hard.",eq:"DB"},
{n:"Cable Seated Row",s:"4×10",r:"2 min",no:"Squeeze shoulder blades. Vary grip weekly.",eq:"Cable"},
{n:"Chest-Supported DB Row",s:"3×12",r:"60s",no:"Incline bench face-down. Pure back.",eq:"DB"},
]},
{name:"C — ARMS & GRIP",notes:"Forearm/grip endurance directly impacts late-round putting.",ex:[
{n:"Hammer Curls",s:"3×10",r:"60s",no:"Brachioradialis + forearm.",eq:"DB"},
{n:"Cable Curl",s:"3×12",r:"60s",no:"Constant tension. Great for peak contraction.",eq:"Cable"},
{n:"Farmer's Carry",s:"3×40yd",r:"60s",no:"Heaviest DBs you can hold. Grip, traps, core.",eq:"DB"},
]}
]},
{day:"Wednesday",label:"LEGS + SINGLE-LEG POWER",icon:"⚡",focus:"Quads, glutes, hip power, single-leg stability",dg:"X-step drive, plant-foot bracing, hill navigation, injury-proof knees",dur:"~75 min",
warmup:["Bike — 4 min progressive","Goblet squat hold — 30 sec","Walking lunges (BW) — 10/side","Single-leg glute bridge — 2×10/side"],
blocks:[
{name:"A — COMPOUND LOWER",notes:"Build raw leg strength. These are your PR lifts.",ex:[
{n:"Goblet Squat (or DB Front Squat)",s:"4×8",r:"2.5 min",no:"Heaviest DB. When 50 lbs is easy, add pauses or tempo.",eq:"DB"},
{n:"DB Romanian Deadlift",s:"4×10",r:"2 min",no:"Slow eccentric (3s down). Protects low back for DG rounds.",eq:"DB"},
]},
{name:"B — SINGLE-LEG (DG SPECIFIC)",notes:"Disc golf is a single-leg sport. Your brace foot absorbs massive force.",ex:[
{n:"Bulgarian Split Squat",s:"3×8/side",r:"90s",no:"THE most transferable exercise to disc golf. Mimics the plant.",eq:"DB"},
{n:"Single-Leg DB Step-Up",s:"3×10/side",r:"60s",no:"Drive through the heel. No push-off from back foot.",eq:"DB"},
{n:"Cable Pull-Through",s:"3×12",r:"60s",no:"Hip hinge. Glute activation + posterior chain.",eq:"Cable"},
]},
{name:"C — CORE STABILITY",notes:"Anti-rotation and bracing — protects your spine during max throws.",ex:[
{n:"Pallof Press (Cable)",s:"3×10/side",r:"60s",no:"THE anti-rotation exercise.",eq:"Cable"},
{n:"Dead Bug",s:"3×8/side",r:"45s",no:"Slow and controlled. Add DB or band when easy.",eq:"Floor"},
{n:"Plank Shoulder Taps",s:"3×10/side",r:"45s",no:"Anti-rotation under fatigue. Hips dead still.",eq:"Floor"},
]}
]},
{day:"Thursday",label:"UPPER HYPERTROPHY + SHOULDER HEALTH",icon:"💎",focus:"Volume — chest, back, shoulders, arms",dg:"Muscle endurance for tournament rounds, balanced physique, injury-proofing",dur:"~60 min",
warmup:["Jump rope — 3 min","Band dislocates — 2×10","Push-ups — 2×10","Arm circles — 30s each direction"],
blocks:[
{name:"A — PUSH/PULL SUPERSETS",notes:"Paired sets. Rest 60-90s between pairs.",ex:[
{n:"A1: DB Floor Press",s:"4×10",r:"—",no:"Floor limits ROM — safer for shoulders under volume.",eq:"DB"},
{n:"A2: Cable Lat Pulldown (or Pull-Ups)",s:"4×10",r:"90s",no:"Superset with floor press. Wide grip for V-taper.",eq:"Cable/Bar"},
{n:"B1: Arnold Press",s:"3×10",r:"—",no:"Rotation during press mimics throwing mechanics.",eq:"DB"},
{n:"B2: Cable Face Pull + Ext Rotation",s:"3×15",r:"60s",no:"Superset. Rear delts + rotator cuff.",eq:"Cable"},
]},
{name:"B — ARMS & DETAIL",notes:"Chase the pump.",ex:[
{n:"Incline DB Curl",s:"3×10",r:"60s",no:"Stretched position. Long head bicep.",eq:"DB"},
{n:"Cable Tricep Pushdown",s:"3×12",r:"60s",no:"Rope attachment. Squeeze hard at bottom.",eq:"Cable"},
{n:"DB Lateral Raise (Drop Set)",s:"2×(12,10,8)",r:"90s",no:"2 brutal drop sets. Boulder shoulders.",eq:"DB"},
{n:"Cable Rear Delt Fly",s:"3×15",r:"45s",no:"Light weight. Feel the squeeze.",eq:"Cable"},
]}
]},
{day:"Friday",label:"ATHLETIC POWER + CONDITIONING",icon:"🔥",focus:"Explosive movement, conditioning, mobility",dg:"Round stamina, explosive first-step, mental toughness in playoff holes",dur:"~70 min",
warmup:["Rowing machine — 3 min building intensity","Kettlebell halo — 2×8/direction","Hip 90/90 switches — 10 reps","High knees — 30 sec"],
blocks:[
{name:"A — POWER",notes:"Train the nervous system to produce force FAST.",ex:[
{n:"KB Swing",s:"5×10",r:"90s",no:"Explosive hip snap. Think about your throw's hip engagement.",eq:"KB"},
{n:"Jump Squat (BW or Light DB)",s:"4×6",r:"90s",no:"Max height. Land soft. Rate of force development.",eq:"Floor/DB"},
{n:"Rotational Cable Chop (Explosive)",s:"3×8/side",r:"60s",no:"Lighter than Monday. Focus on SPEED of rotation.",eq:"Cable"},
]},
{name:"B — CONDITIONING CIRCUIT",notes:"3 rounds, minimal rest. Simulates tournament effort.",ex:[
{n:"KB Goblet Squat → Push-Ups → Renegade Row → Jump Rope",s:"3 rounds",r:"90s between",no:"10 squats / 15 push-ups / 8 rows per side / 60s rope. No rest between exercises.",eq:"KB/DB/Rope"},
]},
{name:"C — MOBILITY COOLDOWN",notes:"Disc golf demands range of motion. Invest here.",ex:[
{n:"90/90 Hip Stretch",s:"60s/side",r:"—",no:"Hip internal rotation — hidden key to huge drives.",eq:"Floor"},
{n:"Thoracic Spine Rotation (Open Book)",s:"8/side",r:"—",no:"Unlock your t-spine. More rotation = more distance.",eq:"Floor"},
{n:"Shoulder Sleeper Stretch",s:"45s/side",r:"—",no:"Prevents internal rotation deficit that wrecks throwers.",eq:"Floor"},
]}
]}
];

const PR=[
{w:"1–3",f:"FOUNDATION",d:"Learn all new movements. Hit prescribed reps/sets. Establish baseline weights."},
{w:"4–6",f:"BUILD",d:"Add 2.5–5 lbs to compounds weekly. Pull-up clusters increase by 1 rep/week."},
{w:"7–9",f:"PUSH",d:"Intensity techniques: drop sets, pause reps, tempo. Target 3×3 unassisted pull-ups."},
{w:"10–12",f:"PEAK & DELOAD",d:"Wk 10-11: PR attempts. Wk 12: deload at 60% volume. Test max pull-ups."},
];

let ad=0,eb={},vw='w';

function R(){
const a=document.getElementById('app');
let h='';
h+=`<div class="header"><h1>ROTATIONAL ATHLETE PROTOCOL</h1><div class="sub">5-DAY DISC GOLF STRENGTH & POWER — DB / CABLE / KB / PULL-UP BAR</div></div>`;
h+=`<div class="view-btns"><button class="view-btn ${vw==='w'?'active':''}" onclick="vw='w';R()">WORKOUTS</button><button class="view-btn ${vw==='p'?'active':''}" onclick="vw='p';R()">PROGRESSION</button></div>`;
if(vw==='p'){h+=rP();}else{h+=rW();}
h+=`<div class="footer">SAT + SUN → DISC GOLF / ACTIVE RECOVERY / REST &nbsp;·&nbsp; SLEEP 7–8 HRS &nbsp;·&nbsp; PROTEIN 0.8–1G/LB</div>`;
a.innerHTML=h;
}

function rW(){
let h='';const d=D[ad];
h+=`<div class="day-tabs">`;
D.forEach((x,i)=>{h+=`<button class="day-tab ${ad===i?'active':''}" onclick="ad=${i};eb={};R()"><span class="di">${x.icon}</span>${x.day.slice(0,3).toUpperCase()}</button>`;});
h+=`</div>`;
h+=`<div class="day-header"><h2>${d.day.toUpperCase()} — ${d.label}</h2><div class="focus">${d.focus}</div><span class="dur">${d.dur}</span><div class="dgt"><strong>DG TRANSFER:</strong> ${d.dg}</div></div>`;
h+=`<div class="warmup"><div class="warmup-t">WARMUP</div>${d.warmup.map(w=>`<div class="warmup-i">→ ${w}</div>`).join('')}</div>`;
d.blocks.forEach((b,bi)=>{
const o=eb[bi];
h+=`<div class="block"><button class="bh" onclick="eb[${bi}]=!eb[${bi}];R()"><span>${b.name}</span><span class="tgl">${o?'−':'+'}</span></button>`;
if(o){
h+=`<div class="bb"><div class="bn">${b.notes}</div>`;
b.ex.forEach(e=>{
h+=`<div class="ex"><div class="et"><span class="en">${e.n}</span><div class="em"><span class="es">${e.s}</span>${e.r!=='—'?`<span class="er">REST ${e.r}</span>`:''}</div></div><div class="eno">${e.no}</div><span class="eq">${e.eq}</span></div>`;
});
h+=`</div>`;}
h+=`</div>`;});
return h;
}

function rP(){
let h=`<h2 style="font-family:'Outfit',sans-serif;font-size:16px;color:var(--accent);letter-spacing:2px;margin-bottom:14px;">12-WEEK PROGRESSION</h2>`;
PR.forEach(p=>{h+=`<div class="pc"><span class="wb">WK ${p.w}</span><span class="pn">${p.f}</span><div class="pd">${p.d}</div></div>`;});
h+=`<div class="ib g"><strong>PULL-UP ROADMAP</strong><br>Wk 1–3: Cluster singles/doubles + negatives → 8–10 reps/session<br>Wk 4–6: Build to 5×2 unassisted → drop band assistance<br>Wk 7–9: Target 3×3 → add weighted negatives<br>Wk 10–12: Test max set → goal: 5+ unassisted</div>`;
h+=`<div class="ib y"><strong>WHEN 50 LB DUMBBELLS AREN'T ENOUGH</strong><br>→ 3-sec eccentric, 1-sec pause, explosive concentric<br>→ 1.5 reps: down, halfway up, back down, all the way up = 1<br>→ 2-sec paused reps at the hardest point<br>→ Single-arm/single-leg variations<br>→ Pre-exhaust: isolation before compound</div>`;
return h;
}

R();
</script>
</body>
</html>
