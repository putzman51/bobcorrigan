<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotational Athlete Protocol — Disc Golf Strength Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&family=Outfit:wght@300;400;600;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222;
    --border-hi: #333;
    --text: #e4e0d8;
    --text-dim: #888;
    --text-muted: #555;
    --accent: #ff4d00;
    --accent-glow: rgba(255, 77, 0, 0.15);
    --accent-dim: #cc3d00;
    --green: #2ecc71;
    --green-dim: rgba(46, 204, 113, 0.15);
    --green-border: rgba(46, 204, 113, 0.3);
    --yellow: #d4a832;
    --yellow-dim: rgba(212, 168, 50, 0.1);
    --yellow-border: rgba(212, 168, 50, 0.25);
    --timer-bg: #1a0800;
    --timer-border: #331a00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 720px; margin: 0 auto; padding: 16px; }

  /* HEADER */
  .header {
    border-bottom: 2px solid var(--accent);
    padding-bottom: 14px;
    margin-bottom: 20px;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--accent);
    box-shadow: 0 0 20px var(--accent), 0 0 60px rgba(255,77,0,0.3);
  }
  .header h1 {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(18px, 4.5vw, 26px);
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .header .sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* NAV TABS */
  .view-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .view-tab {
    padding: 5px 12px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .view-tab:hover { border-color: var(--text-dim); color: var(--text-dim); }
  .view-tab.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
  }
  .day-tab {
    flex: 1;
    padding: 10px 4px;
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .day-tab:hover { border-color: var(--border-hi); }
  .day-tab .day-icon { font-size: 16px; display: block; margin-bottom: 3px; }
  .day-tab.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }
  .day-tab .day-complete-dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    margin-top: 3px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .day-tab .day-complete-dot.show { opacity: 1; }

  /* DAY HEADER */
  .day-header {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .day-header h2 {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .day-header .focus {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .day-header .duration {
    display: inline-block;
    font-size: 10px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 2px 8px;
    margin-top: 8px;
  }
  .dg-transfer {
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--yellow-dim);
    border: 1px solid var(--yellow-border);
    font-size: 10px;
    color: var(--yellow);
    letter-spacing: 0.5px;
  }
  .dg-transfer strong { color: #e8c24a; }

  /* WARMUP */
  .warmup {
    background: var(--green-dim);
    border: 1px solid var(--green-border);
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .warmup-title {
    font-size: 9px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  .warmup-item {
    font-size: 11px;
    color: rgba(46, 204, 113, 0.75);
    padding: 1px 0;
  }

  /* BLOCKS */
  .block {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .block.all-done { border-color: var(--green-border); }
  .block-header {
    width: 100%;
    padding: 11px 14px;
    background: transparent;
    color: var(--text);
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.15s;
  }
  .block-header:hover { background: var(--surface2); }
  .block-header .toggle { color: var(--accent); font-size: 16px; font-weight: 400; }
  .block-body { padding: 0 14px 14px; }
  .block-notes {
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 10px;
    line-height: 1.5;
  }

  /* EXERCISES */
  .exercise {
    padding: 10px 0;
    border-top: 1px solid var(--border);
  }
  .exercise:first-child { border-top: none; }
  .ex-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ex-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }
  .ex-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .ex-sets-label {
    font-size: 9px;
    color: var(--bg);
    background: var(--accent);
    padding: 2px 6px;
    font-weight: 700;
    white-space: nowrap;
  }
  .ex-rest {
    font-size: 9px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .ex-notes {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.5;
  }
  .ex-equip {
    display: inline-block;
    font-size: 8px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 1px 5px;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* SET BUBBLES */
  .set-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .set-label {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
    width: 32px;
    flex-shrink: 0;
  }
  .set-bubble {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border-hi);
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .set-bubble:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
  }
  .set-bubble.done {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .set-bubble.done::after {
    content: '✓';
    font-size: 12px;
  }
  .set-bubble:not(.done)::after {
    content: attr(data-num);
  }

  /* TIMER */
  .timer-bar {
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--timer-bg);
    border: 1px solid var(--timer-border);
    display: flex;
    align-items: center;
    gap: 10px;
    animation: timerSlideIn 0.3s ease-out;
  }
  @keyframes timerSlideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .timer-display {
    font-family: 'Outfit', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    min-width: 60px;
    text-align: center;
    letter-spacing: 2px;
  }
  .timer-display.urgent { color: #ff6633; }
  .timer-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .timer-progress {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .timer-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 1s linear;
    box-shadow: 0 0 6px var(--accent);
  }
  .timer-btn {
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .timer-btn:hover { background: var(--accent); color: var(--bg); }

  /* RESET */
  .reset-row {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .reset-btn {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #c0392b; color: #e74c3c; }

  /* PROGRESSION VIEW */
  .prog-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 6px;
  }
  .prog-card .week-badge {
    font-size: 9px;
    background: var(--accent);
    color: var(--bg);
    padding: 2px 8px;
    font-weight: 700;
    display: inline-block;
    margin-right: 8px;
  }
  .prog-card .phase-name {
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
    display: inline;
  }
  .prog-card .phase-detail {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.6;
  }
  .info-box {
    padding: 14px 16px;
    margin-top: 12px;
    font-size: 11px;
    line-height: 1.8;
  }
  .info-box.green { background: var(--green-dim); border: 1px solid var(--green-border); color: rgba(46,204,113,0.8); }
  .info-box.green strong { color: var(--green); }
  .info-box.yellow { background: var(--yellow-dim); border: 1px solid var(--yellow-border); color: rgba(212,168,50,0.8); }
  .info-box.yellow strong { color: var(--yellow); }

  /* PRINCIPLES */
  .principle {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 6px;
  }
  .principle h3 {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .principle p {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.7;
  }

  /* FOOTER */
  .footer {
    margin-top: 20px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-align: center;
  }

  /* SESSION STATS */
  .session-stats {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .stat-chip {
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .stat-chip .stat-val {
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
    font-family: 'Outfit', sans-serif;
    margin-right: 4px;
  }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    .app { padding: 10px; }
    .set-bubble { width: 28px; height: 28px; font-size: 9px; }
    .timer-display { font-size: 18px; }
  }
</style>
</head>

  { week: "1–3", focus: "FOUNDATION", detail: "Learn all new movements. Hit prescribed reps/sets. Establish baseline weights." },
  { week: "4–6", focus: "BUILD", detail: "Add 2.5–5 lbs to compounds weekly. Pull-up clusters increase by 1 rep/week." },

];

// ============ STATE ============
let state = {
  view: 'program',
  activeDay: 0,
  expandedBlocks: {},
  completedSets: {},
  activeTimer: null,
  timerRemaining: 0,
  timerTotal: 0,
  timerInterval: null,
  timerExKey: null,
};

function getStorageKey() {
  return 'rap_tracker_v2';
}

function saveState() {
  try {
    localStorage.setItem(getStorageKey(), JSON.stringify({
      completedSets: state.completedSets,
    }));
  } catch(e) {}
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(getStorageKey()));
    if (saved && saved.completedSets) {
      state.completedSets = saved.completedSets;
    }
  } catch(e) {}
}

function exKey(dayIdx, blockIdx, exIdx) {
  return `${dayIdx}-${blockIdx}-${exIdx}`;
}

function isSetDone(key, setIdx) {
  return state.completedSets[key] && state.completedSets[key].includes(setIdx);
}

function toggleSet(key, setIdx, restSec) {
  if (!state.completedSets[key]) state.completedSets[key] = [];
  const idx = state.completedSets[key].indexOf(setIdx);
  if (idx === -1) {
    state.completedSets[key].push(setIdx);
    // Start timer if rest > 0
    if (restSec > 0) {
      startTimer(restSec, key);
    }
  } else {
    state.completedSets[key].splice(idx, 1);
    if (state.timerExKey === key) {
      stopTimer();
    }
  }
  saveState();
  render();
}

function startTimer(seconds, exKeyVal) {
  stopTimer();
  state.timerTotal = seconds;
  state.timerRemaining = seconds;
  state.timerExKey = exKeyVal;
  state.timerInterval = setInterval(() => {
    state.timerRemaining--;
    if (state.timerRemaining <= 0) {
      stopTimer();
      // audible chime — 3 tones
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, startTime, duration, vol) {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(vol, startTime);
          gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(startTime);
          osc.stop(startTime + duration);
        }
        const t = ctx.currentTime;
        playTone(660, t, 0.25, 0.5);
        playTone(880, t + 0.2, 0.25, 0.5);
        playTone(1100, t + 0.4, 0.35, 0.6);
      } catch(e) {}
    }
    render();
  }, 1000);
  render();
}

function stopTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = null;
  state.timerRemaining = 0;
  state.timerTotal = 0;
  state.timerExKey = null;
}

function skipTimer() {
  stopTimer();
  render();
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function getDayCompletionPct(dayIdx) {
  const day = DAYS[dayIdx];
  let total = 0, done = 0;
  day.blocks.forEach((b, bi) => {
    b.exercises.forEach((ex, ei) => {
      const k = exKey(dayIdx, bi, ei);
      total += ex.numSets;
      done += (state.completedSets[k] || []).length;
    });
  });
  return total > 0 ? done / total : 0;
}

function getSessionStats(dayIdx) {
  const day = DAYS[dayIdx];
  let total = 0, done = 0;
  day.blocks.forEach((b, bi) => {
    b.exercises.forEach((ex, ei) => {
      const k = exKey(dayIdx, bi, ei);
      total += ex.numSets;
      done += (state.completedSets[k] || []).length;
    });
  });
  return { total, done };
}

function resetDay(dayIdx) {
  const day = DAYS[dayIdx];
  day.blocks.forEach((b, bi) => {
    b.exercises.forEach((ex, ei) => {
      delete state.completedSets[exKey(dayIdx, bi, ei)];
    });
  });
  stopTimer();
  saveState();
  render();
}

function resetAll() {
  state.completedSets = {};
  stopTimer();
  saveState();
  render();
}

// ============ RENDER ============
function render() {
  const app = document.getElementById('app');
  let html = '';

  // Header
  html += `<div class="header">
    <h1>ROTATIONAL ATHLETE PROTOCOL</h1>
    <div class="sub">5-DAY DISC GOLF STRENGTH & POWER — DB / CABLE / KB / PULL-UP BAR</div>
  </div>`;

  // View tabs
  html += `<div class="view-tabs">
    ${['program','progression','principles'].map(v =>
      `<button class="view-tab ${state.view === v ? 'active' : ''}" onclick="state.view='${v}'; render();">${v.toUpperCase()}</button>`
    ).join('')}
  </div>`;

  if (state.view === 'program') {
    html += renderProgram();
  } else if (state.view === 'progression') {
    html += renderProgression();
  } else {
    html += renderPrinciples();
  }

  // Footer
  html += `<div class="footer">SAT + SUN → DISC GOLF / ACTIVE RECOVERY / REST &nbsp;|&nbsp; SLEEP 7–8 HRS &nbsp;|&nbsp; PROTEIN 0.8–1G/LB</div>`;

  app.innerHTML = html;
}

function renderProgram() {
  let html = '';
  const di = state.activeDay;
  const day = DAYS[di];

  // Day tabs
  html += `<div class="day-tabs">`;
  DAYS.forEach((d, i) => {
    const pct = getDayCompletionPct(i);
    html += `<button class="day-tab ${state.activeDay === i ? 'active' : ''}" onclick="state.activeDay=${i}; state.expandedBlocks={}; render();">
      <span class="day-icon">${d.icon}</span>
      ${d.day.slice(0,3).toUpperCase()}
      <span class="day-complete-dot ${pct >= 1 ? 'show' : ''}"></span>
    </button>`;
  });
  html += `</div>`;

  // Session stats
  const stats = getSessionStats(di);
  const pct = stats.total > 0 ? Math.round(stats.done / stats.total * 100) : 0;
  html += `<div class="session-stats">
    <div class="stat-chip"><span class="stat-val">${stats.done}</span>/<span>${stats.total}</span> SETS</div>
    <div class="stat-chip"><span class="stat-val">${pct}%</span> COMPLETE</div>
  </div>`;

  // Day header
  html += `<div class="day-header">
    <h2>${day.day.toUpperCase()} — ${day.label}</h2>
    <div class="focus">${day.focus}</div>
    <span class="duration">${day.duration}</span>
    <div class="dg-transfer"><strong>DG TRANSFER:</strong> ${day.dgTransfer}</div>
  </div>`;

  // Warmup
  html += `<div class="warmup">
    <div class="warmup-title">WARMUP</div>
    ${day.warmup.map(w => `<div class="warmup-item">→ ${w}</div>`).join('')}
  </div>`;

  // Blocks
  day.blocks.forEach((block, bi) => {
    const expanded = state.expandedBlocks[bi];
    // Check if all sets in block are done
    let blockTotal = 0, blockDone = 0;
    block.exercises.forEach((ex, ei) => {
      const k = exKey(di, bi, ei);
      blockTotal += ex.numSets;
      blockDone += (state.completedSets[k] || []).length;
    });
    const allDone = blockTotal > 0 && blockDone >= blockTotal;

    html += `<div class="block ${allDone ? 'all-done' : ''}">
      <button class="block-header" onclick="state.expandedBlocks[${bi}] = !state.expandedBlocks[${bi}]; render();">
        <span>${block.name} ${allDone ? '✓' : ''}</span>
        <span class="toggle">${expanded ? '−' : '+'}</span>
      </button>`;

    if (expanded) {
      html += `<div class="block-body">
        <div class="block-notes">${block.notes}</div>`;

      block.exercises.forEach((ex, ei) => {
        const k = exKey(di, bi, ei);
        html += `<div class="exercise">
          <div class="ex-top">
            <span class="ex-name">${ex.name}</span>
            <div class="ex-meta">
              <span class="ex-sets-label">${ex.sets}</span>
              ${ex.rest !== '—' ? `<span class="ex-rest">REST ${ex.rest}</span>` : ''}
            </div>
          </div>
          <div class="ex-notes">${ex.notes}</div>
          <span class="ex-equip">${ex.equip}</span>
          <div class="set-row">
            <span class="set-label">SETS</span>`;

        for (let s = 0; s < ex.numSets; s++) {
          const done = isSetDone(k, s);
          html += `<button class="set-bubble ${done ? 'done' : ''}" data-num="${s+1}" onclick="toggleSet('${k}', ${s}, ${ex.restSec})"></button>`;
        }
        html += `</div>`;

        // Timer for this exercise
        if (state.timerExKey === k && state.timerRemaining > 0) {
          const pctLeft = (state.timerRemaining / state.timerTotal) * 100;
          const urgent = state.timerRemaining <= 5;
          html += `<div class="timer-bar">
            <div class="timer-display ${urgent ? 'urgent' : ''}">${formatTime(state.timerRemaining)}</div>
            <div class="timer-label">REST</div>
            <div class="timer-progress"><div class="timer-progress-fill" style="width:${pctLeft}%"></div></div>
            <button class="timer-btn" onclick="skipTimer()">SKIP</button>
          </div>`;
        }

        html += `</div>`;
      });

      html += `</div>`;
    }
    html += `</div>`;
  });

  // Reset buttons
  html += `<div class="reset-row">
    <button class="reset-btn" onclick="if(confirm('Reset today\\'s sets?')) resetDay(${di})">RESET TODAY</button>
    <button class="reset-btn" onclick="if(confirm('Reset ALL tracked data?')) resetAll()">RESET ALL</button>
  </div>`;

  return html;
}

function renderProgression() {
  let html = '';
  html += `<h2 style="font-family:'Outfit',sans-serif;font-size:16px;color:var(--accent);letter-spacing:2px;margin-bottom:14px;">12-WEEK PROGRESSION MODEL</h2>`;
  PROGRESSION.forEach(p => {
    html += `<div class="prog-card">
      <span class="week-badge">WK ${p.week}</span>
      <span class="phase-name">${p.focus}</span>
      <div class="phase-detail">${p.detail}</div>
    </div>`;
  });

  html += `<div class="info-box green">
    <strong>PULL-UP ROADMAP</strong><br>
    Wk 1–3: Cluster singles/doubles + negatives → 8–10 reps/session<br>
    Wk 4–6: Build to 5×2 unassisted → drop band assistance<br>
    Wk 7–9: Target 3×3 → add weighted negatives<br>
    Wk 10–12: Test max set → goal: 5+ unassisted
  </div>`;

  html += `<div class="info-box yellow">
    <strong>WHEN 50 LB DUMBBELLS AREN'T ENOUGH</strong><br>
    → 3-sec eccentric, 1-sec pause, explosive concentric<br>
    → 1.5 reps: down, halfway up, back down, all the way up = 1<br>
    → 2-sec paused reps at the hardest point<br>
    → Single-arm/single-leg variations<br>
    → Pre-exhaust: isolation before compound
  </div>`;

  return html;
}

function renderPrinciples() {
  let html = '';
  html += `<h2 style="font-family:'Outfit',sans-serif;font-size:16px;color:var(--accent);letter-spacing:2px;margin-bottom:14px;">PROGRAMMING PRINCIPLES</h2>`;
  PRINCIPLES.forEach(p => {
    html += `<div class="principle">
      <h3>${p.title}</h3>
      <p>${p.body}</p>
    </div>`;
  });
  return html;
}

// ============ INIT ============
loadState();
render();
</script>
